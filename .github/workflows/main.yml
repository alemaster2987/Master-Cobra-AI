name: Build-Master-Cobra
on: [push]
jobs:
  ps3-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git libgmp3-dev libelf-dev python3

      - name: Setup PS3 Toolchain
        run: |
          # Esto descarga e instala el entorno mínimo necesario
          docker run --rm -v $(pwd):/src psl1ght/psl1ght:latest /bin/bash -c "cd /src && make clean && make"

      - name: Upload PKG
        uses: actions/upload-artifact@v4
        with:
          name: MasterCobra_v7_PKG
          path: "*.pkg"


