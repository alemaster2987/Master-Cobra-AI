name: Build-Master-Cobra
on: [push]
jobs:
  ps3-build:
    runs-on: ubuntu-latest
    container: ghcr.io/ps3dev/ps3dev:master
    steps:
      - uses: actions/checkout@v4
      
      - name: Compile
        run: |
          . /etc/profile.d/ps3dev.sh
          make clean
          make
          
      - name: Upload PKG
        uses: actions/upload-artifact@v4
        with:
          name: MasterCobra-v7-Build
          path: "./*.pkg"
          if-no-files-found: error # Esto te avisará si el 'make' no generó el PKG

