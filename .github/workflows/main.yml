name: Build-Master-Cobra
on: [push]
jobs:
  ps3-build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ps3dev/ps3dev:master
    steps:
      - uses: actions/checkout@v4
      
      - name: Compile
        run: |
          make clean
          make
          
      - name: Upload PKG
        uses: actions/upload-artifact@v4
        with:
          name: MasterCobra_v7_PKG
          path: "*.pkg"
